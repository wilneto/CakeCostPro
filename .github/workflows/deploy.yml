name: Deploy CakeCost Pro

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Prepare SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust deploy host
        run: |
          PORT="${DEPLOY_PORT:-22}"
          ssh-keyscan -p "$PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Prepare server env file
        run: |
          cat > cakecost-pro.env <<EOF
          NODE_ENV=production
          HOST=0.0.0.0
          PORT=80
          DB_NAME=${DB_NAME}
          DB_USER=${DB_USER}
          DB_PASSWORD=${DB_PASSWORD}
          EOF

      - name: Sync application files
        run: |
          PORT="${DEPLOY_PORT:-22}"
          rsync -az --delete \
            -e "ssh -p $PORT" \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'tmp' \
            --exclude 'server/data' \
            --exclude '.github' \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Upload environment file
        run: |
          PORT="${DEPLOY_PORT:-22}"
          scp -P "$PORT" cakecost-pro.env "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/cakecost-pro.env"

      - name: Deploy on server
        run: |
          PORT="${DEPLOY_PORT:-22}"
          ssh -p "$PORT" "${DEPLOY_USER}@${DEPLOY_HOST}" "APP_DIR='${DEPLOY_PATH}' APP_USER='${DEPLOY_USER}' ENV_FILE='/tmp/cakecost-pro.env' bash -s" < deploy/server-deploy.sh
